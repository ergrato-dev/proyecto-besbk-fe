<svg width="1280" height="260" viewBox="0 0 1280 260" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1280" height="260" fill="#0a0a0a"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="260" fill="#c026d3"/>

  <!-- Bottom accent bar -->
  <rect x="0" y="257" width="1280" height="3" fill="#c026d3"/>

  <!-- Top-right corner bracket -->
  <path d="M 1252 40 L 1252 24 L 1236 24" stroke="#c026d3" stroke-width="2" stroke-linecap="square"/>

  <!-- NN Badge: border -->
  <rect x="44" y="63" width="90" height="90" stroke="#c026d3" stroke-width="1.5"/>
  <!-- NN Badge: corner fills -->
  <rect x="44"  y="63"  width="9" height="9" fill="#c026d3"/>
  <rect x="125" y="63"  width="9" height="9" fill="#c026d3"/>
  <rect x="44"  y="144" width="9" height="9" fill="#c026d3"/>
  <rect x="125" y="144" width="9" height="9" fill="#c026d3"/>
  <!-- NN Badge: text -->
  <text
    x="89" y="108"
    text-anchor="middle" dominant-baseline="middle"
    font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
    font-size="36" font-weight="800" fill="#c026d3" letter-spacing="-1">NN</text>

  <!-- Title -->
  <text
    x="168" y="118"
    font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
    font-size="60" font-weight="800" fill="#ffffff" letter-spacing="-2">Auth System</text>

  <!-- Subtitle -->
  <text
    x="170" y="162"
    font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
    font-size="18" font-weight="500" fill="#c026d3" letter-spacing="6">KOTLIN EDITION</text>

  <!-- Separator -->
  <rect x="168" y="182" width="680" height="1" fill="#1e1e1e"/>

  <!-- Tech stack -->
  <text
    x="168" y="216"
    font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
