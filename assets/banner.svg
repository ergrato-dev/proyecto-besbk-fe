  <!-- Right decoration: Kotlin-inspired concentric diamonds -->
  <polygon points="1100,18  1212,130  1100,242  988,130"  stroke="#c026d3" stroke-width="1.5"/>
  <polygon points="1100,52  1178,130  1100,208  1022,130" stroke="#c026d3" stroke-width="1"   opacity="0.5"/>
  <polygon points="1100,82  1148,130  1100,178  1052,130" stroke="#c026d3" stroke-width="0.8" opacity="0.3"/>

  <!-- Diamond center dot -->
