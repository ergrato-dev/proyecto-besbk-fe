  <!-- Diamond corner dots -->
  <circle cx="1100" cy="18"  r="2.5" fill="#c026d3"/>
  <circle cx="1212" cy="130" r="2.5" fill="#c026d3"/>
  <circle cx="1100" cy="242" r="2.5" fill="#c026d3"/>
  <circle cx="988"  cy="130" r="2.5" fill="#c026d3"/>

</svg>
